<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#008081" />
  <meta name="description" content="Retro Windows 95-inspired portfolio by Montassar Hajri." />
  <base target="_parent">
  <link rel="stylesheet" href="https://use.typekit.net/llo2eru.css" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="/manifest.json" />
  <title>Montassar Hajri - OS</title>
  <script>
    window.addEventListener('load', () => {
      addEventListener('mousemove', (event) => {
        window.parent.postMessage({ clientX: event.clientX, clientY: event.clientY, type: 'mousemove' }, '*');
      });
      addEventListener('mousedown', () => {
        window.parent.postMessage({ type: 'mousedown' }, '*');
      });
      addEventListener('mouseup', () => {
        window.parent.postMessage({ type: 'mouseup' }, '*');
      });
      addEventListener('keydown', (event) => {
        window.parent.postMessage({ type: 'keydown', key: event.key }, '*');
      });
      addEventListener('keyup', (event) => {
        window.parent.postMessage({ type: 'keyup', key: event.key }, '*');
      });
    });
  </script>
  <script src="/js-dos/js-dos.js"></script>
  <link rel="stylesheet" href="/js-dos/js-dos.css">
  <script>
    emulators.pathPrefix = "/js-dos/";
  </script>
</head>
